name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APKs
        run: |
          ./gradlew --no-daemon :app:assembleFossDebug
          ./gradlew --no-daemon :app:assembleFullDebug

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testFossDebugUnitTest

      - name: Build unsigned release APKs
        run: |
          ./gradlew --no-daemon :app:assembleFossRelease
          ./gradlew --no-daemon :app:assembleFullRelease

      - name: Upload unsigned release APKs
        uses: actions/upload-artifact@v4
        with:
          name: haramveil-release-unsigned
          path: |
            app/build/outputs/apk/foss/release/app-foss-release-unsigned.apk
            app/build/outputs/apk/full/release/app-full-release-unsigned.apk
          if-no-files-found: error
