<span class="font-headline font-extrabold tracking-tighter text-primary-fixed text-xl">HaramVeil</span>
</div>
<!-- Central Protection Component -->
<div class="flex-1 flex flex-col items-center justify-center space-y-12">
<!-- The "Veil" Toggle/Icon - System Specific -->
<div class="relative group">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-error-container/20 blur-[64px] rounded-full"></div>
<!-- The Shield Icon -->
<div class="relative w-40 h-40 md:w-56 md:h-56 bg-surface-container rounded-xl flex items-center justify-center shadow-[0_0_64px_0_rgba(215,56,59,0.15)] ring-1 ring-error/20">

<div class="absolute flex items-center justify-center">
<span class="material-symbols-outlined text-surface-container-lowest text-4xl md:text-5xl font-bold" data-icon="close">close</span>
</div>
</div>
</div>
</div>
<!-- Block Message -->
<div class="space-y-4">
<h1 class="font-headline font-extrabold text-display-md md:text-display-lg text-on-background tracking-tight">

</h1>
<!-- Spiritual Ayah Section -->
<div class="pt-8 pb-4 space-y-6">
<div class="w-12 h-px bg-outline-variant/30 mx-auto"></div>
<p class="font-headline text-2xl md:text-4xl text-on-surface-variant font-light leading-relaxed italic px-4">

                    </p>
<p class="font-label text-sm uppercase tracking-[0.2em] text-primary/60">

                    </p>
<div class="w-12 h-px bg-outline-variant/30 mx-auto"></div>
</div>
</div>
</div>

<button class="group relative w-full md:w-auto md:min-w-[280px] px-8 py-5 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold text-lg transition-all active:scale-95 duration-200 shadow-[0_8px_32px_0_rgba(97,244,216,0.2)]">

<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span>Go Back</span>
</div>

<div class="absolute inset-0 rounded-full bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>

<p class="mt-8 font-label text-on-surface-variant/40 text-xs tracking-widest uppercase">
